name: release

# Roda quando voce empurra uma tag tipo v1.2.3 — builda self-contained win-x64,
# zipa, e cria a release no github com release notes geradas a partir dos commits.
#
# Fluxo: bumpa <Version> no csproj (opcional, o workflow injeta a partir da tag),
# commita, "git tag -a vX.Y.Z -m '...'", "git push --follow-tags".
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained win-x64)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          dotnet publish coomer -c Release -r win-x64 `
            -p:PublishAot=false `
            -p:Version=$version `
            --self-contained `
            -o publish-release

      - name: Zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "publish-release\*" -DestinationPath "coomer-$tag-win-x64.zip" -CompressionLevel Optimal

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" "./coomer-${{ github.ref_name }}-win-x64.zip" `
            --title "coomer ${{ github.ref_name }}" `
            --generate-notes
