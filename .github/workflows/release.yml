name: release

# Roda quando voce empurra uma tag tipo v1.2.3. Builda NativeAOT (exe unico,
# self-contained), zipa coomer.exe + glfw3.dll, cria a release no github e
# atualiza o manifest do Scoop (scoop/coomer.json) com a url/hash novos.
#
# Fluxo: "git tag -a vX.Y.Z -m '...'" e "git push --follow-tags".
# Os runners windows-latest ja tem MSVC + vswhere no PATH, entao o AOT linka
# direto sem precisar do build.ps1.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (NativeAOT win-x64)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          dotnet publish coomer -c Release -r win-x64 `
            -p:Version=$version `
            -o dist
          Remove-Item dist\coomer.pdb -ErrorAction SilentlyContinue
          Get-ChildItem dist | Select-Object Name, Length

      - name: Zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "dist\*" -DestinationPath "coomer-$tag-win-x64.zip" -CompressionLevel Optimal

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "./coomer-$tag-win-x64.zip"
          # se a release ja foi criada na mao antes da tag chegar aqui,
          # so atualiza o asset em vez de quebrar com "already exists".
          gh release view $tag --json tagName 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "release $tag ja existe — atualizando asset"
            gh release upload $tag $zip --clobber
          } else {
            gh release create $tag $zip `
              --title "coomer $tag" `
              --generate-notes
          }

      - name: Update Scoop manifest
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $zip = "coomer-$tag-win-x64.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/$zip"

          $manifestPath = "scoop/coomer.json"
          $m = Get-Content $manifestPath -Raw | ConvertFrom-Json
          $m.version = $version
          $m.architecture.'64bit'.url = $url
          $m.architecture.'64bit'.hash = $hash
          ($m | ConvertTo-Json -Depth 10) | Set-Content $manifestPath -Encoding utf8

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $manifestPath
          # sem diff = nada pra commitar (ex: manifest ja foi bumpado na mao).
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "scoop: bump to $version"
            git push origin "HEAD:${{ github.event.repository.default_branch }}"
          } else {
            Write-Host "manifest ja esta na versao $version, sem commit"
          }
